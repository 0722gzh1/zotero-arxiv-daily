        - "reaction coordinates for base flipping"
        - "repair-enzyme DNA complexes"
      methods:
        - "all-atom molecular dynamics simulation"
        - "enhanced sampling and free-energy calculations"
        - "reaction-coordinate design"
        - "structural analysis of enzyme-DNA complexes"
        - "binding kinetics and lesion recognition assays"
        - "molecular interaction plotting"
        - "thermodynamic pathway reconstruction"
      research_questions:
        - "What reaction coordinates best capture DNA or RNA base flipping?"
        - "How do repair enzymes recognize damaged bases before full extrusion?"
        - "How do protein-DNA contacts reshape local deformability and lesion accessibility?"
        - "What energetic barriers distinguish spontaneous base opening from enzyme-assisted flipping?"
        - "How do repair pathways differ across uracil, alkylated, and oxidized lesions?"
      positive_examples:
        - "The base flipping of A-DNA-a molecular dynamic simulation study"
        - "Reaction Coordinate and Thermodynamics of Base Flipping in RNA"
        - "An Improved Reaction Coordinate for Nucleic Acid Base Flipping Studies"
        - "Kinetic Mechanism of Damage Site Recognition and Uracil Flipping by Escherichia coli Uracil DNA Glycosylase"
        - "Free Energy Landscape of Lesion Recognition by Human 8-Oxoguanine DNA N-Glycosylase 1: Mechanistic Insights into Detection and Processing of 8-Oxoguanine in DNA"
        - "The very moment when UDG recognizes a flipped-out uracil base in dsDNA"
      negative_boundaries:
        - "genome editing papers that do not analyze base-flipping or repair-enzyme dynamics"
        - "generic molecular dynamics method papers without DNA or RNA base extrusion"
        - "DNA repair reviews without structural, kinetic, or simulation-level mechanism"
        - "epigenetic methylation papers without nucleotide flipping or lesion recognition"
        - "RNA design papers focused on tertiary folding rather than base-flipping thermodynamics"
        - "protein-only conformational dynamics papers without nucleic-acid substrates"

