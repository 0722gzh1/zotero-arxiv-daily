topic_profiles:
  enabled: true
  auto_generate: false
  match_top_n: 3
  topics:
    - id: de_novo_protein_and_biopolymer_design
      name: "De Novo Protein and Biopolymer Design"
      description: "Design of new proteins, enzymes, binders, assemblies, and protein-nucleic-acid complexes with experimentally testable structure-function objectives."
      core_objects:
        - "de novo protein scaffolds"
        - "designed enzymes and metalloproteins"
        - "sequence-specific DNA-binding proteins"
        - "protein binders and miniproteins"
        - "protein assemblies and oligomers"
        - "GPCR and cytokine modulators"
        - "nucleoprotein complexes"
        - "intrinsically disordered protein ensembles"
      methods:
        - "RFdiffusion and diffusion-based backbone generation"
        - "structure-conditioned sequence design"
        - "AlphaFold-family structural screening"
        - "motif scaffolding and active-site design"
        - "directed evolution after computational design"
        - "biochemical and cell-based functional assays"
        - "crystallography, cryo-EM, and SHAPE-seq validation"
      research_questions:
        - "How can generated backbones be made designable, stable, and functional?"
        - "How can protein designs achieve sequence-specific DNA or ligand recognition?"
        - "How can catalytic activity and stereoselectivity be introduced into new scaffolds?"
        - "How can designed assemblies control signaling, recording, or biomolecular organization?"
        - "How should computational design models be filtered before wet-lab testing?"
      positive_examples:
        - "The past, present and future of de novo protein design"
        - "De novo design of protein structure and function with RFdiffusion"
        - "Generative design of sequence specific DNA binding proteins"
        - "A de novo CO2 Reductase Featuring a Cysteine-Ligated Cobalt Porphyrin Cofactor"
        - "De novo design of RNA and nucleoprotein complexes"
        - "De novo design of GPCR exoframe modulators"
      negative_boundaries:
        - "generic protein structure prediction papers without a design or engineering objective"
        - "generic ML benchmark papers without protein, RNA, DNA, or biomolecular design"
        - "small-molecule drug discovery papers without designed protein or biopolymer components"
        - "clinical immunotherapy papers without de novo designed binders or receptors"
        - "database papers that only catalog sequences without design, generation, or functional engineering"
        - "molecular dynamics papers focused only on natural protein motion without design implications"

    - id: precision_base_prime_and_mitochondrial_editing
      name: "Precision Base, Prime, and Mitochondrial Genome Editing"
      description: "Engineering and mechanistic study of CRISPR, deaminase, TALE-linked, transposon, base-editor, and prime-editor systems for precise nuclear or mitochondrial genome modification."
      core_objects:
        - "cytosine base editors"
        - "adenine base editors"
        - "mitochondrial DNA editors"
        - "TALE-linked deaminases"
        - "Cas9, Cas12, Cas10, and IscB editors"
        - "pegRNA-guided prime editors"
        - "deaminase domains and TadA variants"
        - "off-target DNA and RNA editing outcomes"
      methods:
        - "structure-guided editor engineering"
        - "AlphaFold-guided mutation scanning"
        - "CRISPRi screens and target-library analysis"
        - "machine-learning-guided variant selection"
        - "split or compact editor architecture design"
        - "deep sequencing of editing outcomes"
        - "cryo-EM and biochemical mechanism analysis"
      research_questions:
        - "How can base editors increase efficiency while reducing bystander and off-target edits?"
        - "Which structural features control deaminase substrate scope and editor precision?"
        - "How can compact editors be optimized for delivery-constrained applications?"
        - "How can mitochondrial DNA editing be made precise and therapeutically useful?"
        - "What cellular determinants shape prime-editing and base-editing outcomes?"
      positive_examples:
        - "Computational design of a high-precision mitochondrial DNA cytosine base editor"
        - "Structural insights into DdCBE in action enable high-precision mitochondrial DNA editing"
        - "Engineering Compact Base Editors by AlphaFold-Guided Mutation Scan and Escherichia coli-Based Tri-Selection"
        - "AI-guided Cas9 engineering provides an effective strategy to enhance base editing"
        - "Structural basis for pegRNA-guided reverse transcription by a prime editor"
        - "Search-and-replace genome editing without double-strand breaks or donor DNA"
      negative_boundaries:
        - "general CRISPR biology papers without editor engineering or precise editing outcomes"
        - "gene therapy delivery papers without base, prime, mitochondrial, or programmable editing"
        - "epigenetic methylation studies without a genome-editing tool or deaminase mechanism"
        - "protein design papers where the designed protein is not an editor or editing component"
        - "RNA editing papers without programmable editor engineering or measurable editing specificity"
        - "clinical genetics papers that mention variants but do not test editing-based correction"

