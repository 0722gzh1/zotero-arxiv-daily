        - "retrieval-augmented autoregressive modeling"
        - "epistasis-aware variant ranking"
        - "ML-guided directed evolution"
        - "combinatorial library optimization"
        - "sequence-activity display assays"
        - "biophysical pretraining and transfer learning"
      research_questions:
        - "How well can PLMs predict useful mutations without large labeled datasets?"
        - "How can epistasis be modeled to design higher-order protein variants?"
